<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>திருக்கோவில் பூஜை நினைவூட்டல்</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700;900&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root {
    --green: #00a651;
    --green-dark: #007a3a;
    --green-light: #00d166;
    --yellow: #ffd700;
    --yellow-light: #fff176;
    --yellow-dark: #f4a900;
    --orange: #ff6f00;
    --red: #e53935;
    --white: #ffffff;
    --bg: #0a2a0f;
    --card: #0f3d18;
    --card2: #143d1c;
    --text: #ffffff;
    --muted: #a5d6a7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, #1a4a1a 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a3a00 0%, transparent 60%);
    font-family: 'Noto Sans Tamil', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #005c1e 0%, #007a3a 50%, #009c4a 100%);
    border-bottom: 4px solid var(--yellow);
    padding: 16px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,215,0,0.04) 20px, rgba(255,215,0,0.04) 40px
    );
  }
  .header-deco {
    font-size: 28px;
    letter-spacing: 8px;
    margin-bottom: 4px;
    position: relative;
  }
  .header h1 {
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    line-height: 1.4;
    position: relative;
  }
  .header h2 {
    font-size: clamp(11px, 3vw, 14px);
    color: #c8f0c8;
    font-weight: 400;
    margin-top: 4px;
    position: relative;
  }

  /* MONTH SELECTOR */
  .month-bar {
    background: var(--card);
    border-bottom: 2px solid var(--green);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .month-bar label {
    color: var(--yellow);
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
  }
  .month-bar select, .month-bar input {
    background: var(--bg);
    border: 2px solid var(--green);
    color: var(--white);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    font-family: 'Noto Sans Tamil', sans-serif;
    outline: none;
  }
  .month-bar select:focus, .month-bar input:focus {
    border-color: var(--yellow);
  }
  .btn-load {
    background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-weight: 900;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 12px rgba(255,215,0,0.3);
  }
  .btn-load:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(255,215,0,0.4); }
  .btn-load:active { transform: translateY(0); }

  /* MAIN */
  .main { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border: 2px solid var(--green);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* DAY CARDS */
  .day-card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .day-card:hover { border-color: var(--green-light); transform: translateY(-2px); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }

  .day-badge {
    min-width: 52px;
    height: 52px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    flex-shrink: 0;
  }
  .day-badge .dd { font-size: 22px; line-height: 1; }
  .day-badge .mo { font-size: 10px; font-weight: 600; }

  /* Color by type */
  .type-tuesday .day-badge { background: linear-gradient(135deg, #b71c1c, #e53935); }
  .type-friday .day-badge { background: linear-gradient(135deg, #880e4f, #e91e8c); }
  .type-amavasai .day-badge { background: linear-gradient(135deg, #1a237e, #3949ab); }
  .type-pournami .day-badge { background: linear-gradient(135deg, #e65100, #ff9800); color: #000; }
  .type-sashti .day-badge { background: linear-gradient(135deg, #1b5e20, #43a047); }
  .type-chathurthi .day-badge { background: linear-gradient(135deg, #f57f17, #fdd835); color: #000; }

  .type-tuesday { border-left: 4px solid #e53935; }
  .type-friday { border-left: 4px solid #e91e8c; }
  .type-amavasai { border-left: 4px solid #3949ab; }
  .type-pournami { border-left: 4px solid #ff9800; }
  .type-sashti { border-left: 4px solid #43a047; }
  .type-chathurthi { border-left: 4px solid #fdd835; }

  .day-info { flex: 1; min-width: 0; overflow: visible; }
  .day-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--yellow);
    white-space: nowrap;
    overflow: visible;
    text-overflow: unset;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .day-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .day-deity {
    font-size: 20px;
    flex-shrink: 0;
  }

  /* EDIT DATE */
  .edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px 8px;
  }
  .edit-row input[type="date"] {
    background: var(--bg);
    border: 2px solid var(--green);
    color: var(--white);
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 13px;
    outline: none;
    font-family: 'Noto Sans Tamil', sans-serif;
  }
  .btn-edit {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
  }
  .btn-edit:hover { background: var(--green-light); }
  .edited-tag {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    border-radius: 4px;
    padding: 2px 6px;
    font-weight: 700;
  }

  /* MESSAGE BOX */
  .msg-panel {
    padding: 0 14px 14px;
    display: none;
  }
  .msg-panel.open { display: block; }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .time-row label {
    font-size: 13px;
    color: var(--yellow);
    font-weight: 700;
    white-space: nowrap;
  }
  .time-row input {
    background: var(--bg);
    border: 2px solid var(--yellow);
    color: var(--white);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    width: 120px;
    outline: none;
    font-family: 'Noto Sans Tamil', sans-serif;
  }
  .time-row input::placeholder { color: #666; }

  .msg-box {
    background: #0a1f0d;
    border: 2px solid var(--green);
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    line-height: 1.8;
    color: #e8f5e9;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 80px;
    font-family: 'Noto Sans Tamil', sans-serif;
  }

  .btn-copy {
    margin-top: 10px;
    width: 100%;
    background: linear-gradient(135deg, #00a651, #00d166);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 12px rgba(0,166,81,0.4);
  }
  .btn-copy:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,166,81,0.5); }
  .btn-copy.copied { background: linear-gradient(135deg, var(--yellow), var(--yellow-dark)); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 64px; margin-bottom: 16px; }
  .empty p { font-size: 16px; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--yellow-dark);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 16px 0 8px;
  }

  /* CHEVRON */
  .chevron {
    font-size: 18px;
    color: var(--green-light);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* TODAY HIGHLIGHT */
  .today-glow {
    box-shadow: 0 0 0 2px var(--yellow), 0 0 20px rgba(255,215,0,0.2);
  }
  .today-chip {
    background: var(--yellow);
    color: #000;
    font-size: 10px;
    font-weight: 900;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--green-light);
    font-size: 18px;
  }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--green);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }

  /* LIVE BADGE */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #00a651, #00d166);
    color: #000;
    font-size: 13px;
    font-weight: 900;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 8px;
    box-shadow: 0 0 16px rgba(0,214,102,0.5);
    position: relative;
  }
  .live-dot {
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    animation: livePulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
    50% { opacity: 0.7; transform: scale(1.3); box-shadow: 0 0 0 6px rgba(255,255,255,0); }
  }

  /* TODAY CARD LIVE indicator */
  .today-live-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px 0;
  }
  .today-live-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #b71c1c;
    color: #fff;
    font-size: 12px;
    font-weight: 900;
    padding: 3px 10px;
    border-radius: 12px;
    animation: todayGlow 1.5s ease-in-out infinite;
  }
  .today-live-chip .rdot {
    width: 8px; height: 8px;
    background: #ff5252;
    border-radius: 50%;
    animation: livePulse 1s ease-in-out infinite;
  }
  @keyframes todayGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(183,28,28,0.6); }
    50% { box-shadow: 0 0 18px rgba(255,82,82,0.9); }
  }
  .special-panel {
    background: linear-gradient(135deg, #1a3a00, #0f2800);
    border: 2px solid var(--yellow);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .special-panel h3 {
    color: var(--yellow);
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 12px;
  }
  .special-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .special-form input[type="text"],
  .special-form input[type="date"] {
    background: var(--bg);
    border: 2px solid var(--green);
    color: var(--white);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Noto Sans Tamil', sans-serif;
    outline: none;
    width: 100%;
  }
  .special-form input:focus { border-color: var(--yellow); }
  .btn-add-special {
    background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
    box-shadow: 0 4px 12px rgba(255,215,0,0.3);
  }
  .btn-add-special:active { transform: scale(0.98); }

  /* SPECIAL type card */
  .type-special .day-badge { background: linear-gradient(135deg, #4a0080, #9c27b0); }
  .type-special { border-left: 4px solid #ce93d8; }

  /* DELETE button */
  .btn-delete {
    background: #b71c1c;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
    margin-left: 8px;
  }
  .btn-delete:hover { background: #e53935; }

  /* Firebase status */
  .fb-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .fb-ok { background: #1b5e20; color: #a5d6a7; }
  .fb-err { background: #b71c1c; color: #ffcdd2; }
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="header-deco">🪔 🙏 🪔</div>
  <h1>அருள்மிகு ஸ்ரீ வீரமாத்தி அம்மன்<br>&amp; ஸ்ரீ முனியப்பன் திருக்கோவில்</h1>
  <h2>சங்ககிரி &nbsp;|&nbsp; பூஜை நினைவூட்டல் அமைப்பு</h2>
  <div>
    <span class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </span>
  </div>
</div>

<!-- MONTH BAR -->
<div class="month-bar">
  <label>📅 மாதம்:</label>
  <select id="selMonth">
    <option value="0">ஜனவரி</option><option value="1">பிப்ரவரி</option>
    <option value="2">மார்ச்</option><option value="3">ஏப்ரல்</option>
    <option value="4">மே</option><option value="5">ஜூன்</option>
    <option value="6">ஜூலை</option><option value="7">ஆகஸ்ட்</option>
    <option value="8">செப்டம்பர்</option><option value="9">அக்டோபர்</option>
    <option value="10">நவம்பர்</option><option value="11">டிசம்பர்</option>
  </select>
  <input type="number" id="selYear" value="2026" min="2024" max="2030" style="width:80px">
  <button class="btn-load" onclick="loadMonth()">✨ காட்டு</button>
</div>

<!-- SPECIAL EVENT PANEL -->
<div class="main" style="padding-bottom:0">
  <div class="special-panel">
    <h3>✨ சிறப்பு விசேஷம் சேர்</h3>
    <div id="fbStatus" class="fb-status fb-ok">🔄 Firebase இணைக்கிறோம்...</div>
    <div class="special-form">
      <input type="text" id="specialName" placeholder="உதா: கும்பாபிஷேகம், திருவிழா, நேர்த்திக்கடன்...">
      <input type="date" id="specialDate">
      <button class="btn-add-special" onclick="addSpecialEvent()">➕ சேர்</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="empty">
    <div class="icon">🪔</div>
    <p>மாதம் தேர்வு செய்து "காட்டு" அழுத்துங்கள்</p>
  </div>
</div>

function addSpecialEvent() {
  const name = document.getElementById('specialName').value.trim();
  const date = document.getElementById('specialDate').value;
  if (!name) { alert('பூஜை பெயர் type பண்ணுங்கள்!'); return; }
  if (!date) { alert('தேதி select பண்ணுங்கள்!'); return; }

}

function deleteSpecialEvent(key) {
  if (!confirm('இந்த விசேஷத்தை நீக்கணுமா?')) return;
  db.ref('specialEvents/' + key).remove().then(() => loadMonth());
}

// ============================================================
// STATE
// ============================================================
let currentEvents = [];
let overrides = {}; // dateKey → new ISO date string

// ============================================================
// HELPERS
// ============================================================
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fromISO(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function isToday(isoStr) {
  return isoStr === toISO(new Date());
}

// ============================================================
// LOAD MONTH
// ============================================================
function loadMonth() {
  const month = parseInt(document.getElementById('selMonth').value);
  const year  = parseInt(document.getElementById('selYear').value);

  document.getElementById('mainContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div><br>
      கணக்கிடுகிறோம்...
    </div>`;

  setTimeout(() => {
    buildEvents(month, year);
    renderEvents(month, year);
  }, 400);
}

// ============================================================
// BUILD EVENTS FOR MONTH
// ============================================================
function buildEvents(month, year) {
  currentEvents = [];
  overrides = {};

  // 1. Tuesdays & Fridays in this month
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month, d);
    const dow = dt.getDay();
    const iso = toISO(dt);
    if (dow === 2) currentEvents.push({ type: 'tuesday',    date: iso, key: iso+'-tue' });
    if (dow === 5) currentEvents.push({ type: 'friday',     date: iso, key: iso+'-fri' });
  }

  // 2. Special dates from arrays
  const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const addFrom = (arr, type) => {
    arr.forEach(d => {
      if (d.startsWith(monthStr)) {
        currentEvents.push({ type, date: d, key: d+'-'+type });
      }
    });
  };
  addFrom(AMAVASAI,    'amavasai');
  addFrom(POURNAMI,    'pournami');
  addFrom(SASHTI,      'sashti');
  addFrom(CHATHURTHI,  'chathurthi');

  // 3. Special events from Firebase for this month
  const monthStr2 = `${year}-${String(month+1).padStart(2,'0')}`;
  specialEvents.forEach(ev => {
    if (ev.date && ev.date.startsWith(monthStr2)) {
      currentEvents.push({ type: 'special', date: ev.date, key: ev.date+'-special-'+ev.key, firebaseKey: ev.key, label: ev.name });
    }
  });

  // Sort by date
  currentEvents.sort((a, b) => a.date.localeCompare(b.date));
}

// ============================================================
// RENDER
// ============================================================
function renderEvents(month, year) {
  const container = document.getElementById('mainContent');

  if (!currentEvents.length) {
    container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>இந்த மாதத்தில் விவரங்கள் இல்லை</p></div>';
    return;
  }

  // Count stats
  const weeklyCount  = currentEvents.filter(e => e.type==='tuesday'||e.type==='friday').length;
  const specialCount = currentEvents.filter(e => !['tuesday','friday'].includes(e.type)).length;

  let html = `
    <div class="stats-row" style="animation: slideIn 0.3s ease">
      <div class="stat-card">
        <div class="stat-num">${currentEvents.length}</div>
        <div class="stat-label">மொத்த பூஜைகள்</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#ff9800">${weeklyCount}</div>
        <div class="stat-label">வாரம் / weekly</div>

      <div class="stat-card">

      </div>
    </div>
    <div class="section-label">📋 ${MONTH_NAMES_TA[month]} ${year} — பூஜை நாட்கள்</div>
  `;

  currentEvents.forEach((ev, idx) => {
    const cfg = TYPE_CONFIG[ev.type];

    const dt  = fromISO(ev.date);

    html += `
      <div class="day-card type-${ev.type} ${today ? 'today-glow' : ''}" id="card-${idx}" style="animation-delay:${idx*0.05}s">

            <span class="mo">${mo}</span>
          </div>
          <div class="day-info">
            <div class="day-title">
              ${cfg.emoji} ${displayLabel}
              ${today ? '<span class="today-chip">இன்று!</span>' : ''}
              ${edited}
            </div>
            <div class="day-sub">${dayName} &nbsp;•&nbsp; ${ev.type==='special' ? 'சிறப்பு பூஜை' : cfg.deity}</div>
            ${ev.type==='special' ? `<button class="btn-delete" onclick="event.stopPropagation();deleteSpecialEvent('${ev.firebaseKey}')">🗑️ நீக்கு</button>` : ''}

          <div class="day-deity" style="font-size:24px">${cfg.icon}</div>
          <div class="chevron" id="chev-${idx}">▼</div>
        </div>

        <div class="edit-row">
          <span style="font-size:11px;color:var(--muted)">✏️ தேதி திருத்து:</span>
          <input type="date" id="editDate-${idx}" value="${ev.date}">
          <button class="btn-edit" onclick="applyEdit(${idx})">சரி</button>
        </div>
        ${today ? `<div class="today-live-row"><span class="today-live-chip"><span class="rdot"></span> இன்று பூஜை நடக்கிறது!</span></div>` : ''}

        <div class="msg-panel" id="msg-${idx}">

            <label>⏰ பூஜை நேரம்:</label>

  container.innerHTML = html;

      specialLine = `இன்று *பௌர்ணமி!*\nசந்திர தரிசனம் & அம்மன் சிறப்பு பூஜை நடைபெறும்.`;
      break;
    case 'sashti':
      greeting = `🪶 *சஷ்டி பூஜை* 🪶`;
      specialLine = `இன்று *சஷ்டி!*\n*ஸ்ரீ முருகன்* அருளாட்சி சிறப்பு நாள்.\nவேல் முருகா! 🙏`;
      break;
    case 'chathurthi':
      greeting = `🐘 *சதுர்த்தி பூஜை* 🐘`;
      specialLine = `இன்று *சதுர்த்தி!*\n*ஸ்ரீ விநாயகர்* அருளாட்சி சிறப்பு நாள்.\nகணபதி போற்றி! 🙏`;
      break;
    case 'special':
      greeting = `🌟 *${ev.label}* 🌟`;
      specialLine = `இன்று *${ev.label}* நடைபெறுகிறது!\nகோவிலில் சிறப்பு பூஜை உள்ளது.`;
      break;
  }

  return `🪔 *${TEMPLE}* 🪔

${greeting}

📅 தேதி: *${dd} ${mo} ${yr}* (${day})
${specialLine}

${timeStr}
✨ அனைத்து பக்தர்களையும் அன்புடன் அழைக்கிறோம்! ✨

🙏 *அனைவரும் வருக! தெய்வ அருள் கிடைக்கும்!* 🙏

📍 ${TEMPLE}`;
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleMsg(idx) {
  const panel = document.getElementById(`msg-${idx}`);
  const chev  = document.getElementById(`chev-${idx}`);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function refreshMsg(idx) {
  const time = document.getElementById(`time-${idx}`).value;
  const ev = currentEvents[idx];
  document.getElementById(`msgtext-${idx}`).textContent = buildMessage(ev, time);
}

function applyEdit(idx) {
  const newDate = document.getElementById(`editDate-${idx}`).value;
  if (!newDate) return;
  const ev = currentEvents[idx];
  overrides[ev.key] = newDate;
  currentEvents[idx].date = newDate;
  // Re-render card title
  const dt = fromISO(newDate);
  const dd = String(dt.getDate()).padStart(2,'0');
  const mo = MONTH_NAMES_TA[dt.getMonth()].substring(0,3);
  const cfg = TYPE_CONFIG[ev.type];
  const dayName = DAY_NAMES_TA[dt.getDay()];
  const card = document.getElementById(`card-${idx}`);
  card.querySelector('.day-badge .dd').textContent = dd;
  card.querySelector('.day-badge .mo').textContent = mo;
  card.querySelector('.day-sub').textContent = `${dayName} • ${cfg.deity}`;
  card.querySelector('.day-title').innerHTML = `${cfg.emoji} ${cfg.label} <span class="edited-tag">✏️ திருத்தம்</span>`;
  // refresh message if open
  refreshMsg(idx);
  alert(`✅ தேதி ${newDate} என்று மாற்றப்பட்டது!`);
}

function copyMsg(idx) {
  const text = document.getElementById(`msgtext-${idx}`).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copybtn-${idx}`);
    btn.textContent = '✅ Copy ஆச்சு! WhatsApp-ல் Paste பண்ணுங்கள்!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 WhatsApp-ல் அனுப்ப Copy பண்ணுங்கள்';
      btn.classList.remove('copied');
    }, 3000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById(`copybtn-${idx}`);
    btn.textContent = '✅ Copy ஆச்சு!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 WhatsApp-ல் அனுப்ப Copy பண்ணுங்கள்';
      btn.classList.remove('copied');
    }, 3000);
  });
}
